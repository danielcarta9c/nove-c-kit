# ops-auto-commit-workflow.yml — Scheletro Nove C per workflow GitHub Actions
# che esegue un'operazione cloud (psql, wrangler, ecc.) e auto-committa
# l'output in un file del repo. Vedi PLAYBOOK §35 per il razionale.
#
# Copia in `.github/workflows/<nome-ops>.yml` del tuo repo, sostituisci i
# <placeholder>, e assicurati che i secret citati esistano in
# GitHub Settings → Secrets and variables → Actions.

name: <nome-ops> autolog

on:
  workflow_dispatch:                  # un click dalla UI Actions
  # schedule:
  #   - cron: "*/15 * * * *"           # loop autonomo (5-15 min di latenza)

permissions:
  contents: write                      # serve per auto-committare il log

concurrency:
  group: <nome-ops>
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Esegui operazione e cattura output
        env:
          # Sostituisci coi tuoi secret. Esempi:
          # PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          # CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SEGRETO: ${{ secrets.SEGRETO }}
        run: |
          set +e                        # non far fallire lo step prima di salvare il log
          mkdir -p ops/out
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="ops/out/${TS}.log"

          # ====== sostituisci con il tuo comando ======
          # Esempio psql verso Supabase (Session Pooler IPv4, porta 5432):
          # psql -v ON_ERROR_STOP=1 \
          #      -h aws-0-eu-central-1.pooler.supabase.com -p 5432 \
          #      -U postgres.<project-ref> -d postgres \
          #      -f sql/ops/<script>.sql > "$OUT" 2>&1
          # Esempio wrangler:
          # npx wrangler deploy > "$OUT" 2>&1
          # ============================================

          echo "# exit_code: $?" >> "$OUT"
          cat "$OUT"

      - name: Auto-commit del log
        if: always()                   # commit anche su errore (l'errore è il log che vuoi leggere)
        working-directory: .            # esplicito: se il job ha un default, il path raddoppia
        run: |
          git config user.name "ops-bot"
          git config user.email "ops-bot@users.noreply.github.com"
          git add ops/out/
          git diff --staged --quiet && exit 0   # niente da committare
          git commit -m "chore(ops): autolog <nome-ops> [skip ci]"
          git push origin main
